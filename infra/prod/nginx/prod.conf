server {
    listen 80;
    server_name easyoficina.app.br *.easyoficina.app.br;

    # 1. Permite o Health Check interno sem redirecionar para HTTPS
    location /up {
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2. Redireciona o restante, mas apenas se NÃO for HTTPS (evita loop com Cloudflare)
    location / {
        if ($http_x_forwarded_proto != "https") {
            return 301 https://$host$request_uri;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }
}

server {
    listen 443 ssl;
    server_name easyoficina.app.br *.easyoficina.app.br;

    ssl_certificate /etc/nginx/ssl/easyoficina.pem;
    ssl_certificate_key /etc/nginx/ssl/easyoficina.key;

    # Melhora a compatibilidade com o Proxy da Cloudflare
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/public;
    index index.php index.html;

    client_max_body_size 10M;

    # Cabeçalhos de segurança (Mantenha o seu padrão)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # 3. Garante que o Laravel saiba que está em HTTPS
    fastcgi_param HTTPS on;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(css|js|map|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # Otimização de buffers para o seu sistema de gestão
        fastcgi_buffer_size 64k;
        fastcgi_buffers 8 128k;
        fastcgi_busy_buffers_size 256k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}